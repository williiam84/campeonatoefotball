<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastro campeonato efootball</title>
    <style>
        body{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:10px;
            background:#111;
            color:white;
            font-family:Arial;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
        .carregamento-background{
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .carregamento-background .animacao-carregando{
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      animation: girar 1s linear infinite;
    }
    @keyframes girar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    </style>
</head>
<body>
    <div class="carregamento-background" id="back_animation">
    <div class="animacao-carregando" id="animation_load"></div>
  </div>
    <h1>CADASTRO CAMPEONATO EFOOTBALL</h1>
    <button id="redirecionar">CADASTRAR AGORA!!</button>
<script>
    const carregamentoBackground = document.getElementById("back_animation");
    const animationLoad = document.getElementById("animation_load");

    function mostrarCarregamento() {  
      carregamentoBackground.style.display = "flex";
      animationLoad.style.display = "block";
      
      setTimeout(() => {
        carregamentoBackground.style.display = "none";
        animationLoad.style.display = "none";
      }, 3000);
    }

    function redirecionar(){
        mostrarCarregamento();
        setTimeout(() => {
            window.open("register.html", "_blank");
        }, 3000);
    }
    const btnRedirecionar = document.getElementById("redirecionar");
    btnRedirecionar.addEventListener("click", redirecionar);
</script>
</body>
</html>
